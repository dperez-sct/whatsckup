server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API y media al backend
    location /api/ {
        proxy_pass http://whatsckup-backend:8000;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://whatsckup-backend:8000;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # React SPA: todas las rutas sin extensión van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
