services:

  backend:
    build: ./backend
    environment:
      APP_PATH: /mnt/app
      MEDIA_PATH: /mnt/input
      DB_CHECK_INTERVAL: "30"
    volumes:
      - ./app_data:/mnt/app
      - ./media_input:/mnt/input:ro
      - ./contacts.vcf:/mnt/app/contacts.vcf:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
